services:
  db:
    image: postgres:16-alpine
    container_name: eduhelp-db
    environment:
      POSTGRES_USER: eduhelp_user
      POSTGRES_PASSWORD: eduhelp_password
      POSTGRES_DB: eduhelp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduhelp_user -d eduhelp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eduhelp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduhelp-backend
    environment:
      - DATABASE_URL=postgresql://eduhelp_user:eduhelp_password@db:5432/eduhelp_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super_secret_jwt_key_for_creackeduhelp_2026
      - ENVIRONMENT=production
      - STORAGE_DIR=/app/storage
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduhelp-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: eduhelp-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  backend_storage:
